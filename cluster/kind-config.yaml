# kind cluster configuration for remote-builder lab
#
# Creates a 3-node cluster:
#   - control-plane: K8s control plane components only (etcd, api-server, scheduler)
#   - infra-node:    All cluster operators + shared services (Argo CD, Istio, Prometheus,
#                    KEDA, Sealed Secrets, MinIO, Buildbarn scheduler)
#   - worker-node:   Tenant workloads only (RBE worker pods)
#                    Tainted so nothing lands here without an explicit toleration.
#
# AWS EKS equivalent:
#   - infra-node   → managed node groups: system (t3.large ×2) + services (m5.large ×2)
#   - worker-node  → managed node group:  rbe-workers (c5.xlarge Spot, 0–20)
#
# cgroup note:
#   Linux kernel 6.x uses cgroup v2 with systemd as the cgroup driver.
#   The containerdConfigPatches below tell containerd inside every kind node container
#   to use SystemdCgroup=true. Without this, the kubelet healthz endpoint times out
#   on worker nodes and the cluster never forms.
#   Your existing clusters (bazel-sim, bootik-local) use the same node image so this
#   patch is already baked into their configs implicitly by older kind versions.
#
# Multi-cluster coexistence:
#   name: remote-builder — never conflicts with bazel-sim or bootik-local.
#   Pause other clusters to free RAM before heavy phases:
#     docker stop $(docker ps -q --filter name=bazel-sim)
#   Resume:
#     docker start $(docker ps -aq --filter name=bazel-sim)

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

name: remote-builder

# ── cgroup v2 / systemd fix ────────────────────────────────────────────────────
# Applied to ALL nodes in the cluster (control-plane + both workers).
# This patches the containerd config inside each kind node container to use the
# systemd cgroup driver, which is required on Linux kernel 6.x with cgroup v2.
#
# Without this patch:
#   The kubelet inside worker containers tries to use the cgroupfs driver.
#   On cgroup v2 systems, cgroupfs driver conflicts with systemd's cgroup management.
#   Result: kubelet healthz endpoint never responds → 4-minute timeout → join fails.
#
# EKS note: EKS AMIs pre-configure the systemd cgroup driver — this is not needed there.
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
      [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options]
        SystemdCgroup = true

nodes:
  # ─────────────────────────────────────────────────────────────────────────────
  # Control plane node
  # Runs: etcd, kube-apiserver, kube-controller-manager, kube-scheduler, CoreDNS
  # Does NOT run any workloads (tainted automatically: node-role.kubernetes.io/control-plane:NoSchedule)
  # ─────────────────────────────────────────────────────────────────────────────
  - role: control-plane
    image: kindest/node:v1.31.2

  # ─────────────────────────────────────────────────────────────────────────────
  # Infra node — cluster-wide operators and shared services
  # Label: pool=infra  (applied via kind's native labels field — reliable on K8s 1.31)
  # Used by: nodeSelector in all Helm charts for Argo CD, Istio, Prometheus, KEDA, MinIO
  # In EKS: EKS managed node group label set in Terraform
  # ─────────────────────────────────────────────────────────────────────────────
  - role: worker
    image: kindest/node:v1.31.2
    labels:
      pool: infra

  # ─────────────────────────────────────────────────────────────────────────────
  # Worker node — RBE execution workers only
  # Label:  pool=rbe-workers  (applied via kind labels field)
  # Taint:  dedicated=rbe-worker:NoSchedule  (applied by bootstrap.sh after cluster up)
  #
  # Pods require this toleration to land here:
  #   tolerations:
  #   - key: dedicated
  #     value: rbe-worker
  #     effect: NoSchedule
  #
  # In EKS: rbe-workers managed node group, Terraform taint:
  #   taint { key="dedicated" value="rbe-worker" effect="NO_SCHEDULE" }
  # ─────────────────────────────────────────────────────────────────────────────
  - role: worker
    image: kindest/node:v1.31.2
    labels:
      pool: rbe-workers
