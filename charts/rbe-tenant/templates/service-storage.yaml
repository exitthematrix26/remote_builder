apiVersion: v1
kind: Service
metadata:
  name: bb-storage
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rbe-tenant.labels" . | nindent 4 }}
    {{- include "rbe-tenant.storage.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "rbe-tenant.storage.selectorLabels" . | nindent 4 }}
  ports:
    - name: grpc
      port: {{ .Values.storage.port }}
      targetPort: grpc
      protocol: TCP
