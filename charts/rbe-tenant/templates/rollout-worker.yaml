apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: bb-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rbe-tenant.labels" . | nindent 4 }}
    {{- include "rbe-tenant.worker.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "rbe-tenant.worker.selectorLabels" . | nindent 6 }}

  strategy:
    canary:
      maxSurge: 1
      maxUnavailable: 0
      steps:
        - setWeight: 25
        - pause:
            duration: 60s
        - analysis:
            templates:
              - templateName: bb-worker-health
        - setWeight: 50
        - pause:
            duration: 60s
        - analysis:
            templates:
              - templateName: bb-worker-health

  template:
    metadata:
      labels:
        {{- include "rbe-tenant.worker.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-worker.yaml") . | sha256sum }}
    spec:
      nodeSelector:
        {{- toYaml .Values.worker.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.worker.tolerations | nindent 8 }}

      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}

      initContainers:
        - name: install-runner
          image: "{{ .Values.image.runnerInstaller.repository }}:{{ .Values.image.runnerInstaller.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["/install"]
          volumeMounts:
            - name: install
              mountPath: /install

        - name: init-worker-dirs
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /worker/build /worker/cache"]
          volumeMounts:
            - name: worker-socket
              mountPath: /worker

        - name: init-worker-config
          image: busybox:1.36
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          command:
            - sh
            - -c
            - |
              cat /config-template/worker.json | \
                sed "s/__POD_NAME__/${POD_NAME}/g" \
                > /worker-config/worker.json
              echo "Generated worker.json for pod: ${POD_NAME}"
              cat /worker-config/worker.json
          volumeMounts:
            - name: config
              mountPath: /config-template
              readOnly: true
            - name: worker-config-dynamic
              mountPath: /worker-config

      containers:
        - name: bb-runner
          image: gcr.io/bazel-public/ubuntu2004-java11:latest
          command:
            - /install/bb_runner
            - /config/runner.json
          volumeMounts:
            - name: install
              mountPath: /install
              readOnly: true
            - name: worker-socket
              mountPath: /worker
            - name: config
              mountPath: /config
              readOnly: true

        - name: bb-worker
          image: "{{ .Values.image.worker.repository }}:{{ .Values.image.worker.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["/worker-config/worker.json"]
          volumeMounts:
            - name: worker-socket
              mountPath: /worker
            - name: worker-config-dynamic
              mountPath: /worker-config
              readOnly: true

          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}

      volumes:
        - name: install
          emptyDir: {}
        - name: worker-socket
          emptyDir: {}
        - name: config
          configMap:
            name: bb-worker-config
        - name: worker-config-dynamic
          emptyDir: {}
