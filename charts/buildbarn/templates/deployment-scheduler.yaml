apiVersion: apps/v1
kind: Deployment
metadata:
  name: bb-scheduler
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "buildbarn.labels" . | nindent 4 }}
    {{- include "buildbarn.scheduler.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.scheduler.replicas }}
  selector:
    matchLabels:
      {{- include "buildbarn.scheduler.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "buildbarn.scheduler.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-scheduler.yaml") . | sha256sum }}
    spec:
      nodeSelector:
        {{- toYaml .Values.scheduler.nodeSelector | nindent 8 }}

      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}

      containers:
        - name: bb-scheduler
          image: "{{ .Values.image.scheduler.repository }}:{{ .Values.image.scheduler.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["/config/scheduler.json"]

          ports:
            # Bazel clients connect here: --remote_executor=grpc://localhost:8981
            - name: grpc-client
              containerPort: {{ .Values.scheduler.clientPort }}
              protocol: TCP
            # Workers connect here to announce capacity and receive work
            - name: grpc-worker
              containerPort: {{ .Values.scheduler.workerPort }}
              protocol: TCP
            # Prometheus /metrics + pprof — exposed by diagnosticsHttpServer
            - name: metrics
              containerPort: {{ .Values.scheduler.metricsPort }}
              protocol: TCP

          readinessProbe:
            grpc:
              port: {{ .Values.scheduler.clientPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6

          livenessProbe:
            grpc:
              port: {{ .Values.scheduler.clientPort }}
            initialDelaySeconds: 15
            periodSeconds: 20

          resources:
            {{- toYaml .Values.scheduler.resources | nindent 12 }}

          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true

      volumes:
        - name: config
          configMap:
            name: bb-scheduler-config
