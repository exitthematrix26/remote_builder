apiVersion: apps/v1
kind: Deployment
metadata:
  name: bb-storage
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "buildbarn.labels" . | nindent 4 }}
    {{- include "buildbarn.storage.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.storage.replicas }}
  selector:
    matchLabels:
      {{- include "buildbarn.storage.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "buildbarn.storage.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-storage.yaml") . | sha256sum }}
    spec:
      nodeSelector:
        {{- toYaml .Values.storage.nodeSelector | nindent 8 }}

      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}

      # ── Init container: create storage directories ───────────────────────
      # bb-storage pre-allocates fixed-size files at startup. It requires the
      # parent directories to exist first — it will not create them itself.
      # This init container creates the directory tree on the emptyDir volume
      # before bb-storage starts.
      initContainers:
        - name: init-storage-dirs
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /storage/cas/persistent_state
              mkdir -p /storage/ac/persistent_state
              echo "Storage directories created:"
              find /storage -type d
          volumeMounts:
            - name: storage
              mountPath: /storage

      containers:
        - name: bb-storage
          image: "{{ .Values.image.storage.repository }}:{{ .Values.image.storage.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["/config/storage.json"]

          ports:
            - name: grpc
              containerPort: {{ .Values.storage.port }}
              protocol: TCP

          readinessProbe:
            grpc:
              port: {{ .Values.storage.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6

          livenessProbe:
            grpc:
              port: {{ .Values.storage.port }}
            initialDelaySeconds: 30
            periodSeconds: 20

          resources:
            {{- toYaml .Values.storage.resources | nindent 12 }}

          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: storage
              mountPath: /storage

      volumes:
        - name: config
          configMap:
            name: bb-storage-config
        # emptyDir: storage is lost on pod restart (acceptable for lab).
        # For persistent cache: replace with a PVC using local-path storageClass.
        - name: storage
          emptyDir:
            sizeLimit: 2Gi
