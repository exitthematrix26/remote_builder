apiVersion: apps/v1
kind: Deployment
metadata:
  name: bb-storage
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "buildbarn.labels" . | nindent 4 }}
    {{- include "buildbarn.storage.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.storage.replicas }}
  selector:
    matchLabels:
      {{- include "buildbarn.storage.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "buildbarn.storage.selectorLabels" . | nindent 8 }}
      annotations:
        # Force pod restart when config changes.
        # Without this annotation, Kubernetes won't restart pods when only
        # a ConfigMap changes (ConfigMap updates don't trigger rollouts).
        checksum/config: {{ include (print $.Template.BasePath "/configmap-storage.yaml") . | sha256sum }}
    spec:
      nodeSelector:
        {{- toYaml .Values.storage.nodeSelector | nindent 8 }}

      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}

      containers:
        - name: bb-storage
          image: "{{ .Values.image.storage.repository }}:{{ .Values.image.storage.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          # bb-storage reads a single JSON config file from the command line.
          # The path matches the ConfigMap volume mount below.
          args: ["/config/storage.json"]

          ports:
            - name: grpc
              containerPort: {{ .Values.storage.port }}
              protocol: TCP

          # bb-storage must be able to reach MinIO before it can serve requests.
          # The readiness probe prevents the scheduler from routing requests to
          # bb-storage until it has successfully connected to MinIO and is ready.
          readinessProbe:
            grpc:
              port: {{ .Values.storage.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6

          livenessProbe:
            grpc:
              port: {{ .Values.storage.port }}
            initialDelaySeconds: 15
            periodSeconds: 20

          resources:
            {{- toYaml .Values.storage.resources | nindent 12 }}

          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true

      volumes:
        - name: config
          configMap:
            name: bb-storage-config
