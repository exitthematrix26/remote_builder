apiVersion: v1
kind: ConfigMap
metadata:
  name: bb-worker-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "buildbarn.labels" . | nindent 4 }}
data:
  # ─────────────────────────────────────────────────────────────────────────
  # bb-worker configuration (Buildbarn v0.0.x / 2026 schema)
  #
  # bb-worker connects to:
  #   - bb-scheduler (workerPort) to register capacity and receive actions
  #   - bb-storage (gRPC) to download inputs from CAS and upload outputs
  #   - bb-runner (Unix socket) to execute the actual build commands
  #
  # blobstore: how bb-worker reaches bb-storage for CAS operations
  # scheduler: which scheduler to register with (address = workerPort)
  # buildDirectories: where to stage inputs and run commands
  #   native.buildDirectoryPath — inputs extracted here before each action
  #   native.cacheDirectoryPath — reusable input cache between actions
  #
  # platformProperties must match what Bazel requests via --platforms /
  # exec_properties in BUILD files. The scheduler uses these to route
  # actions to the correct worker pool.
  # ─────────────────────────────────────────────────────────────────────────
  worker.json: |
    {
      "blobstore": {
        "grpc": {
          "address": "bb-storage:{{ .Values.storage.port }}"
        }
      },
      "maximumMessageSizeBytes": 16777216,
      "scheduler": {
        "address": "bb-scheduler:{{ .Values.scheduler.workerPort }}"
      },
      "buildDirectories": [{
        "native": {
          "buildDirectoryPath": "/worker/build",
          "cacheDirectoryPath": "/worker/cache"
        },
        "runners": [{
          "endpoint": {
            "address": "unix:///worker/runner"
          },
          "concurrency": {{ .Values.worker.concurrency }},
          "platformProperties": {
            "properties": [
              { "name": "OSFamily",  "value": "{{ .Values.worker.platform.os }}"   },
              { "name": "ISA",       "value": "{{ .Values.worker.platform.arch }}" }
            ]
          }
        }]
      }]
    }

  # ─────────────────────────────────────────────────────────────────────────
  # bb-runner configuration
  #
  # bb-runner is the execution engine. It receives RunRequests from bb-worker
  # over a Unix socket and runs the build command as a subprocess.
  #
  # buildExecutor.local — runs commands directly in the container as subprocesses.
  # No Docker-in-Docker, no gVisor. Correct for a trusted lab environment.
  # ─────────────────────────────────────────────────────────────────────────
  runner.json: |
    {
      "grpcServers": [{
        "listenAddresses": ["unix:///worker/runner"],
        "authenticationPolicy": { "allow": {} }
      }],
      "buildExecutor": {
        "local": {}
      },
      "maximumMessageSizeBytes": 16777216
    }
