apiVersion: v1
kind: ConfigMap
metadata:
  name: bb-worker-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "buildbarn.labels" . | nindent 4 }}
data:
  # ─────────────────────────────────────────────────────────────────────────
  # bb-worker configuration (Buildbarn v0.0.x / 2026 schema)
  #
  # blobstore: BlobstoreConfiguration — has two sub-fields:
  #   contentAddressableStorage: how to reach CAS on bb-storage
  #   actionCache: how to reach AC on bb-storage
  #   Both use grpc.client.address — NOT a top-level grpc.address.
  #
  # scheduler: ClientConfiguration — address of bb-scheduler worker port
  #
  # buildDirectories[].runners[].platform: build.bazel.remote.execution.v2.Platform
  #   Uses "platform.properties" NOT "platformProperties" (different proto message)
  # ─────────────────────────────────────────────────────────────────────────
  worker.json: |
    {
      "blobstore": {
        "contentAddressableStorage": {
          "grpc": {
            "client": {
              "address": "bb-storage:{{ .Values.storage.port }}"
            }
          }
        },
        "actionCache": {
          "grpc": {
            "client": {
              "address": "bb-storage:{{ .Values.storage.port }}"
            }
          }
        }
      },
      "maximumMessageSizeBytes": 16777216,
      "scheduler": {
        "address": "bb-scheduler:{{ .Values.scheduler.workerPort }}"
      },
      "inputDownloadConcurrency": 4,
      "outputUploadConcurrency": 4,
      "buildDirectories": [{
        "native": {
          "buildDirectoryPath": "/worker/build",
          "cacheDirectoryPath": "/worker/cache",
          "maximumCacheFileCount": 10000,
          "maximumCacheSizeBytes": 536870912,
          "cacheReplacementPolicy": "LEAST_RECENTLY_USED"
        },
        "runners": [{
          "endpoint": {
            "address": "unix:///worker/runner"
          },
          "concurrency": {{ .Values.worker.concurrency }},
          "platform": {
            "properties": [
              { "name": "ISA",       "value": "{{ .Values.worker.platform.arch }}" },
              { "name": "OSFamily",  "value": "{{ .Values.worker.platform.os }}"   }
            ]
          }
        }]
      }]
    }

  # ─────────────────────────────────────────────────────────────────────────
  # bb-runner configuration (Buildbarn v0.0.x / 2026 schema)
  #
  # bb-runner is the execution engine. It receives RunRequests from bb-worker
  # over a Unix socket and runs build commands as subprocesses.
  #
  # BREAKING CHANGES from older versions:
  #   - "buildExecutor" field removed — the runner IS the executor, no sub-config
  #   - Unix socket path uses "listenPaths" NOT "listenAddresses"
  #   - "buildDirectoryPath" is a top-level field, not nested
  #   - "maximumMessageSizeBytes" moved to global config (omit here)
  # ─────────────────────────────────────────────────────────────────────────
  runner.json: |
    {
      "grpcServers": [{
        "listenPaths": ["/worker/runner"],
        "authenticationPolicy": { "allow": {} }
      }],
      "buildDirectoryPath": "/worker/build"
    }
