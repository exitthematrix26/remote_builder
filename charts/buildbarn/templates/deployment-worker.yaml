apiVersion: apps/v1
kind: Deployment
metadata:
  name: bb-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "buildbarn.labels" . | nindent 4 }}
    {{- include "buildbarn.worker.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "buildbarn.worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "buildbarn.worker.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-worker.yaml") . | sha256sum }}
    spec:
      # ── Node placement ───────────────────────────────────────────────────
      # Workers MUST run on the dedicated worker node.
      # The nodeSelector ensures they land on pool=rbe-workers.
      # The toleration allows them to schedule despite the NoSchedule taint.
      # Without the toleration, Kubernetes refuses to schedule this pod on the
      # worker node — the taint acts as an opt-in gate.
      nodeSelector:
        {{- toYaml .Values.worker.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.worker.tolerations | nindent 8 }}

      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}

      # ── Init container: install bb-runner binary ──────────────────────────
      # The bb-runner-installer image contains the bb-runner binary compiled
      # as a static Linux binary. This init container copies it to a shared
      # emptyDir volume (/install) so the runner container can execute it.
      #
      # Why a separate binary instead of baking it into bb-worker?
      #   Separation of concerns — bb-worker manages queuing/CAS/reporting,
      #   bb-runner handles ONLY execution. Different security boundaries and
      #   update cycles. In production you might use gVisor or Docker as the
      #   runner without changing bb-worker at all.
      initContainers:
        - name: install-runner
          image: "{{ .Values.image.runnerInstaller.repository }}:{{ .Values.image.runnerInstaller.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # The installer image copies the bb-runner binary to /install/bb-runner
          args: ["/install/bb-runner"]
          volumeMounts:
            - name: install
              mountPath: /install

      containers:
        # ── Container 1: bb-runner ──────────────────────────────────────────
        # Listens on Unix socket /worker/runner for RunRequests from bb-worker.
        # Executes build commands in /worker/build using the 'local' executor.
        # The 'local' executor runs commands directly as subprocesses — no
        # Docker-in-Docker, no gVisor. Appropriate for a trusted lab environment.
        #
        # In production with untrusted external builds:
        #   Replace "local" executor with "docker" or "gVisor" in runner.json
        #   to provide proper build action sandboxing.
        - name: bb-runner
          # Run the installed binary directly using the busybox image shell.
          # The binary is a static Go binary — doesn't need Go runtime, just Linux.
          image: busybox:1.36
          command:
            - /install/bb-runner
            - /config/runner.json
          volumeMounts:
            - name: install
              mountPath: /install
              readOnly: true
            - name: worker-socket
              mountPath: /worker
            - name: config
              mountPath: /config
              readOnly: true

        # ── Container 2: bb-worker ──────────────────────────────────────────
        # Connects to the scheduler to receive queued build actions.
        # Downloads action inputs from CAS, sends to runner, uploads outputs.
        # Connects to bb-runner via Unix socket /worker/runner (shared volume).
        - name: bb-worker
          image: "{{ .Values.image.worker.repository }}:{{ .Values.image.worker.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["/config/worker.json"]
          volumeMounts:
            - name: worker-socket
              mountPath: /worker
            - name: config
              mountPath: /config
              readOnly: true

          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}

      # ── Volumes ──────────────────────────────────────────────────────────
      volumes:
        # Shared between initContainer and bb-runner:
        # install-runner copies the binary here; bb-runner executes from here.
        - name: install
          emptyDir: {}

        # Shared between bb-runner and bb-worker:
        # Contains the Unix socket (/worker/runner) and build workspace.
        # emptyDir is per-pod — wiped when the pod restarts.
        # This is correct: build state must not persist between pod lifetimes
        # (all durable outputs go to CAS/MinIO).
        - name: worker-socket
          emptyDir: {}

        # ConfigMap with both worker.json and runner.json
        - name: config
          configMap:
            name: bb-worker-config
