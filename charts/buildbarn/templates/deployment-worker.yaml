apiVersion: apps/v1
kind: Deployment
metadata:
  name: bb-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "buildbarn.labels" . | nindent 4 }}
    {{- include "buildbarn.worker.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "buildbarn.worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "buildbarn.worker.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-worker.yaml") . | sha256sum }}
    spec:
      nodeSelector:
        {{- toYaml .Values.worker.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.worker.tolerations | nindent 8 }}

      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}

      initContainers:
        # ── 1. Install bb-runner binary ───────────────────────────────────────
        - name: install-runner
          image: "{{ .Values.image.runnerInstaller.repository }}:{{ .Values.image.runnerInstaller.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["/install"]
          volumeMounts:
            - name: install
              mountPath: /install

        # ── 2. Pre-create build/cache dirs ────────────────────────────────────
        - name: init-worker-dirs
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /worker/build /worker/cache"]
          volumeMounts:
            - name: worker-socket
              mountPath: /worker

        # ── 3. Write per-pod worker.json with unique workerId ─────────────────
        # bb-worker requires a unique workerId per thread per pod. Without it,
        # all pods generate the same ID and the scheduler rejects duplicates with
        # ResourceExhausted. We inject POD_NAME (from downward API) into the JSON
        # at startup via this init container, writing to a writable emptyDir.
        # The bb-worker container reads from /worker-config/ not /config/.
        - name: init-worker-config
          image: busybox:1.36
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          command:
            - sh
            - -c
            - |
              cat /config-template/worker.json | \
                sed "s/__POD_NAME__/${POD_NAME}/g" \
                > /worker-config/worker.json
              echo "Generated worker.json for pod: ${POD_NAME}"
              cat /worker-config/worker.json
          volumeMounts:
            - name: config
              mountPath: /config-template
              readOnly: true
            - name: worker-config-dynamic
              mountPath: /worker-config

      containers:
        # ── bb-runner ─────────────────────────────────────────────────────────
        - name: bb-runner
          image: busybox:1.36
          command:
            - /install/bb_runner
            - /config/runner.json
          volumeMounts:
            - name: install
              mountPath: /install
              readOnly: true
            - name: worker-socket
              mountPath: /worker
            - name: config
              mountPath: /config
              readOnly: true

        # ── bb-worker ─────────────────────────────────────────────────────────
        - name: bb-worker
          image: "{{ .Values.image.worker.repository }}:{{ .Values.image.worker.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Reads from the dynamically-generated config (has unique workerId),
          # not the static ConfigMap.
          args: ["/worker-config/worker.json"]
          volumeMounts:
            - name: worker-socket
              mountPath: /worker
            - name: worker-config-dynamic
              mountPath: /worker-config
              readOnly: true

          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}

      volumes:
        - name: install
          emptyDir: {}
        - name: worker-socket
          emptyDir: {}
        - name: config
          configMap:
            name: bb-worker-config
        # Writable volume for the per-pod generated worker.json
        - name: worker-config-dynamic
          emptyDir: {}
