apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: bb-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "buildbarn.labels" . | nindent 4 }}
    {{- include "buildbarn.worker.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "buildbarn.worker.selectorLabels" . | nindent 6 }}

  # ── Canary strategy ────────────────────────────────────────────────────────
  # Mimics how a platform team would roll out a new worker toolchain image:
  #   Step 1: Bring up 25% new workers (1 of 4 worker threads) — watch for errors
  #   Step 2: Pause 60s — scheduler routes ~25% of queued actions to new workers
  #   Step 3: Expand to 50% — confirm no regressions at half capacity
  #   Step 4: Pause 60s
  #   Step 5: Full promotion — old workers drained and replaced
  #
  # AnalysisTemplate (added in Phase 4 with Prometheus):
  #   Will query bb-scheduler's error rate metric during each pause step.
  #   If error rate > threshold, Argo Rollouts auto-rolls back to the previous
  #   worker image without any manual intervention.
  #
  # To trigger a rollout: update image.runnerInstaller.tag in values.yaml
  # To monitor:           kubectl argo rollouts get rollout bb-worker -n rbe-system -w
  # To promote manually:  kubectl argo rollouts promote bb-worker -n rbe-system
  # To abort:             kubectl argo rollouts abort bb-worker -n rbe-system
  strategy:
    canary:
      # How many new pods to bring up before scaling down old ones.
      # maxSurge=1 means at most 1 extra pod above desired (conserves resources on 14GB RAM lab).
      maxSurge: 1
      maxUnavailable: 0
      steps:
        - setWeight: 25
        - pause:
            duration: 60s
        # Phase 5: AnalysisRun queries Prometheus for Execute RPC error rate.
        # If (errors/total) > 5% over a 90s window, rollout aborts automatically.
        # Requires kube-prometheus-stack (monitoring namespace) to be healthy.
        - analysis:
            templates:
              - templateName: bb-worker-health
        - setWeight: 50
        - pause:
            duration: 60s
        - analysis:
            templates:
              - templateName: bb-worker-health
        # Full promotion (100%) happens automatically after the final analysis.

  template:
    metadata:
      labels:
        {{- include "buildbarn.worker.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-worker.yaml") . | sha256sum }}
    spec:
      nodeSelector:
        {{- toYaml .Values.worker.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.worker.tolerations | nindent 8 }}

      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}

      initContainers:
        # ── 1. Install bb-runner binary ───────────────────────────────────────
        - name: install-runner
          image: "{{ .Values.image.runnerInstaller.repository }}:{{ .Values.image.runnerInstaller.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["/install"]
          volumeMounts:
            - name: install
              mountPath: /install

        # ── 2. Pre-create build/cache dirs ────────────────────────────────────
        - name: init-worker-dirs
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /worker/build /worker/cache"]
          volumeMounts:
            - name: worker-socket
              mountPath: /worker

        # ── 3. Write per-pod worker.json with unique workerId ─────────────────
        - name: init-worker-config
          image: busybox:1.36
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          command:
            - sh
            - -c
            - |
              cat /config-template/worker.json | \
                sed "s/__POD_NAME__/${POD_NAME}/g" \
                > /worker-config/worker.json
              echo "Generated worker.json for pod: ${POD_NAME}"
              cat /worker-config/worker.json
          volumeMounts:
            - name: config
              mountPath: /config-template
              readOnly: true
            - name: worker-config-dynamic
              mountPath: /worker-config

      containers:
        # ── bb-runner ─────────────────────────────────────────────────────────
        # gcr.io/bazel-public/ubuntu2004-java11 is the canonical Bazel RBE base image.
        # Used by EngFlow's own example repo as the container-image exec_property.
        # Includes: bash, gcc, clang/LLVM-10, python3, git, Java 11, and standard
        # coreutils — the same environment EngFlow workers run actions in.
        - name: bb-runner
          image: gcr.io/bazel-public/ubuntu2004-java11:latest
          command:
            - /install/bb_runner
            - /config/runner.json
          volumeMounts:
            - name: install
              mountPath: /install
              readOnly: true
            - name: worker-socket
              mountPath: /worker
            - name: config
              mountPath: /config
              readOnly: true

        # ── bb-worker ─────────────────────────────────────────────────────────
        - name: bb-worker
          image: "{{ .Values.image.worker.repository }}:{{ .Values.image.worker.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["/worker-config/worker.json"]
          volumeMounts:
            - name: worker-socket
              mountPath: /worker
            - name: worker-config-dynamic
              mountPath: /worker-config
              readOnly: true

          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}

      volumes:
        - name: install
          emptyDir: {}
        - name: worker-socket
          emptyDir: {}
        - name: config
          configMap:
            name: bb-worker-config
        - name: worker-config-dynamic
          emptyDir: {}
