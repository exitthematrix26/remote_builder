apiVersion: v1
kind: ConfigMap
metadata:
  name: bb-storage-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "buildbarn.labels" . | nindent 4 }}
data:
  # ─────────────────────────────────────────────────────────────────────────
  # bb-storage configuration (Buildbarn v0.0.x / 2026 schema)
  #
  # BREAKING CHANGE from older versions:
  #   Old schema used: "blobstore": { "cas": {...}, "ac": {...} } with S3 backend
  #   New schema uses: "contentAddressableStorage" + "actionCache" with local backend
  #   S3/MinIO backend was REMOVED from bb-storage in early 2025.
  #
  # Storage backend: local file-based storage
  #   bb-storage pre-allocates fixed-size files on disk at startup and manages
  #   them internally as a ring-buffer of "blocks". This is faster than S3 for
  #   a local lab and avoids the MinIO dependency for storage.
  #
  # Layout on disk (/storage, backed by emptyDir — lost on pod restart):
  #   /storage/cas/key_location_map  — hash → offset index ({{ .Values.storage.cas.keyLocationMapSize }} bytes)
  #   /storage/cas/blocks            — raw blob data ({{ .Values.storage.cas.blocksSize }} bytes)
  #   /storage/cas/persistent_state/ — epoch state (survives block rotation)
  #   /storage/ac/key_location_map   — action hash → result offset
  #   /storage/ac/blocks             — serialised ActionResult protos
  #   /storage/ac/persistent_state/
  #
  # Why emptyDir for the lab?
  #   Pod restarts invalidate the cache — Bazel rebuilds from scratch.
  #   That is acceptable here; the point is to test RBE mechanics, not
  #   persistent cache durability. Add a PVC for durability in production.
  # ─────────────────────────────────────────────────────────────────────────
  storage.json: |
    {
      "grpcServers": [{
        "listenAddresses": [":{{ .Values.storage.port }}"],
        "authenticationPolicy": { "allow": {} }
      }],
      "maximumMessageSizeBytes": 16777216,
      "contentAddressableStorage": {
        "backend": {
          "local": {
            "keyLocationMapOnBlockDevice": {
              "file": {
                "path": "/storage/cas/key_location_map",
                "sizeBytes": {{ .Values.storage.cas.keyLocationMapSize }}
              }
            },
            "oldBlocks": 2,
            "currentBlocks": 8,
            "newBlocks": 1,
            "blocksOnBlockDevice": {
              "source": {
                "file": {
                  "path": "/storage/cas/blocks",
                  "sizeBytes": {{ .Values.storage.cas.blocksSize }}
                }
              },
              "spareBlocks": 1
            },
            "persistent": {
              "stateDirectoryPath": "/storage/cas/persistent_state",
              "minimumEpochInterval": "300s"
            }
          }
        },
        "getAuthorizer":          { "allow": {} },
        "putAuthorizer":          { "allow": {} },
        "findMissingAuthorizer":  { "allow": {} }
      },
      "actionCache": {
        "backend": {
          "local": {
            "keyLocationMapOnBlockDevice": {
              "file": {
                "path": "/storage/ac/key_location_map",
                "sizeBytes": {{ .Values.storage.ac.keyLocationMapSize }}
              }
            },
            "oldBlocks": 2,
            "currentBlocks": 8,
            "newBlocks": 1,
            "blocksOnBlockDevice": {
              "source": {
                "file": {
                  "path": "/storage/ac/blocks",
                  "sizeBytes": {{ .Values.storage.ac.blocksSize }}
                }
              },
              "spareBlocks": 1
            },
            "persistent": {
              "stateDirectoryPath": "/storage/ac/persistent_state",
              "minimumEpochInterval": "300s"
            }
          }
        },
        "getAuthorizer": { "allow": {} },
        "putAuthorizer": { "allow": {} }
      }
    }
