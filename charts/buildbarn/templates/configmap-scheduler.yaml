apiVersion: v1
kind: ConfigMap
metadata:
  name: bb-scheduler-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "buildbarn.labels" . | nindent 4 }}
data:
  # ─────────────────────────────────────────────────────────────────────────
  # bb-scheduler configuration (Buildbarn v0.0.x / 2026 schema)
  #
  # BREAKING CHANGE from older versions:
  #   Old schema: "scheduler": { "invocationStagedByIdAndTimeout": {} }
  #   New schema: "actionRouter": { "simple": { ... } }
  #
  # The scheduler is the RBE frontend — the entry point for Bazel clients.
  # Two gRPC ports:
  #   clientPort ({{ .Values.scheduler.clientPort }}): Bazel --remote_executor connects here
  #   workerPort ({{ .Values.scheduler.workerPort }}): bb-worker instances register here
  #
  # actionRouter.simple:
  #   platformKeyExtractor.action — uses platform properties from the action itself
  #     (OSFamily, ISA) to match workers. Workers advertise these in their config.
  #   invocationKeyExtractors — groups actions by Bazel invocation ID and tool ID
  #     so one slow build doesn't starve another client's actions.
  #   initialSizeClassAnalyzer — sets default + max execution timeouts.
  #
  # contentAddressableStorage — how the scheduler accesses bb-storage.
  #   Used to check the ActionCache before queuing work. If the action result
  #   is already cached, the scheduler returns it immediately without any workers.
  # ─────────────────────────────────────────────────────────────────────────
  scheduler.json: |
    {
      "clientGrpcServers": [{
        "listenAddresses": [":{{ .Values.scheduler.clientPort }}"],
        "authenticationPolicy": { "allow": {} }
      }],
      "workerGrpcServers": [{
        "listenAddresses": [":{{ .Values.scheduler.workerPort }}"],
        "authenticationPolicy": { "allow": {} }
      }],
      "contentAddressableStorage": {
        "grpc": {
          "client": {
            "address": "bb-storage:{{ .Values.storage.port }}"
          }
        }
      },
      "actionRouter": {
        "simple": {
          "platformKeyExtractor": { "action": {} },
          "invocationKeyExtractors": [
            { "correlatedInvocationsId": {} },
            { "toolInvocationId": {} }
          ],
          "initialSizeClassAnalyzer": {
            "defaultExecutionTimeout": "1800s",
            "maximumExecutionTimeout": "7200s"
          }
        }
      },
      "executeAuthorizer":       { "allow": {} },
      "modifyDrainsAuthorizer":  { "allow": {} },
      "killOperationsAuthorizer":{ "allow": {} },
      "synchronizeAuthorizer":   { "allow": {} },
      "maximumMessageSizeBytes": 268435456,
      "platformQueueWithNoWorkersTimeout": "900s"
    }
